<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; background: var(--bg-color);">
    <a href="index.html" class="theme-toggle" style="position: absolute; top: 1rem; left: 1rem; width: auto; border: 1px solid var(--border-color); background: var(--card-bg); border-radius: 20px; height: 40px; padding: 0 1rem; display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--text-primary); font-weight: 500; font-size: 0.9rem; gap: 0.5rem;">
        <i class="fa-solid fa-arrow-left"></i> Home
    </a>
    <button class="theme-toggle" id="themeToggleMobile" style="position: absolute; top: 1rem; right: 1rem; width: auto; border: 1px solid var(--border-color); background: var(--card-bg); border-radius: 50%; width: 40px; height: 40px; padding: 0;">
        <i class="fa-solid fa-moon"></i>
    </button>
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="logo-icon" style="margin: 0 auto 1rem auto; width: 60px; height: 60px; font-size: 2rem; background: linear-gradient(135deg, #10b981, #059669); color: white; display: flex; align-items: center; justify-content: center; border-radius: 16px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-primary);">Create Account</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Start tracking your expenses today.</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
            </div>
            
            <div id="errorMsg" style="color: var(--danger-color); font-size: 0.9rem; margin-bottom: 1rem; text-align: center; display: none;"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 0.5rem; background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">
                Create Account
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
            Already have an account? <a href="login.html" style="color: #10b981; font-weight: 600; text-decoration: none;">Login here</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
