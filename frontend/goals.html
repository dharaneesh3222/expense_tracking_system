<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Savings Goals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .goal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .goal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="mobile-topbar">
        <a href="dashboard.html" class="brand" style="padding: 0;">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <button class="theme-toggle" id="themeToggleMobile" style="width: auto; padding: 0.5rem; border:none; background:transparent;"><i class="fa-solid fa-moon"></i></button>
    </div>
    <div class="mobile-nav">
        <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="add.html"><i class="fa-solid fa-plus"></i> Add Transaction</a>
        <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
        <a href="goals.html" class="active"><i class="fa-solid fa-bullhorn"></i> Goals</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    </div>

    <aside class="sidebar">
        <a href="dashboard.html" class="brand">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="add.html"><i class="fa-solid fa-plus"></i> Add Transaction</a>
            <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
            <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
            <a href="goals.html" class="active"><i class="fa-solid fa-bullhorn"></i> Goals</a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="profile.html"><i class="fa-solid fa-user"></i> My Profile</a>
        </div>
        <div class="sidebar-bottom">
            <div id="userProfile" style="margin-bottom: 1rem; color: var(--text-primary); font-weight: 700; display: flex; align-items: center; gap: 0.5rem; justify-content: center;">
                <i class="fa-solid fa-user-circle" style="font-size: 1.5rem; color: var(--primary-color);"></i> <span id="userNameDisplay">User</span>
            </div>
            <button class="theme-toggle" id="themeToggle" style="margin-bottom: 0.5rem;">
                <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
            </button>
            <button onclick="window.api.logoutUser()" class="theme-toggle" style="color: var(--danger-color); border-color: transparent;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> <span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="page-title">Savings Goals</h1>
            <button id="addGoalBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Create Goal</button>
        </header>

        <div id="goalsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
            <!-- Rendered by goals.js -->
        </div>
        
        <div id="noGoalsMsg" style="display: none; text-align: center; padding: 3rem 1rem; color: var(--text-secondary); background: var(--card-bg); border-radius: 12px;">
            <i class="fa-solid fa-bullhorn" style="font-size: 3rem; opacity: 0.2; margin-bottom: 1rem; display: block;"></i>
            You have no savings goals yet. Create one to start tracking!
        </div>
    </main>

    <!-- Modal for Add/Edit Goal -->
    <div id="goalModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: var(--card-bg); padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Create New Goal</h2>
            <form id="goalForm">
                <input type="hidden" id="goalId">
                <div class="form-group">
                    <label>Goal Title</label>
                    <input type="text" id="goalTitle" class="form-control" required placeholder="e.g. New Car">
                </div>
                <div class="form-group">
                    <label>Target Amount</label>
                    <input type="number" id="goalTarget" class="form-control" required min="1">
                </div>
                <div class="form-group">
                    <label>Currently Saved (Optional)</label>
                    <input type="number" id="goalSaved" class="form-control" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Target Date (Optional)</label>
                    <input type="date" id="goalDate" class="form-control">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" id="closeModalBtn" class="btn btn-outline" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/goals.js"></script>
</body>
</html>
