<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mobile-topbar">
        <a href="dashboard.html" class="brand" style="padding: 0;">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <button class="theme-toggle" id="themeToggleMobile" style="width: auto; padding: 0.5rem; border:none; background:transparent;"><i class="fa-solid fa-moon"></i></button>
    </div>
    <div class="mobile-nav">
        <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="add.html"><i class="fa-solid fa-plus"></i> Add Transaction</a>
        <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a href="profile.html" class="active"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
        <a href="goals.html"><i class="fa-solid fa-bullhorn"></i> Goals</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

    <aside class="sidebar">
        <a href="dashboard.html" class="brand">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="add.html"><i class="fa-solid fa-plus"></i> Add Transaction</a>
            <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
            <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
            <a href="goals.html"><i class="fa-solid fa-bullhorn"></i> Goals</a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="profile.html" class="active"><i class="fa-solid fa-user"></i> My Profile</a>
        </div>
        <div class="sidebar-bottom">
            <div id="userProfile" style="margin-bottom: 1rem; color: var(--text-primary); font-weight: 700; display: flex; align-items: center; gap: 0.5rem; justify-content: center;">
                <i class="fa-solid fa-user-circle" style="font-size: 1.5rem; color: var(--primary-color);"></i> <span id="userNameDisplay">User</span>
            </div>
            <button class="theme-toggle" id="themeToggle" style="margin-bottom: 0.5rem;">
                <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
            </button>
            <button onclick="window.api.logoutUser()" class="theme-toggle" style="color: var(--danger-color); border-color: transparent;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> <span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">My Profile</h1>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="avatar-upload" style="position: relative; width: 120px; height: 120px; margin: 0 auto 1rem;">
                    <img id="avatarPreview" src="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-color); display: none;">
                    <div id="avatarPlaceholder" style="width: 100%; height: 100%; border-radius: 50%; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: var(--primary-color); border: 3px solid var(--border-color);">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <label for="avatarUpload" style="position: absolute; bottom: 0; right: 0; background: var(--primary-color); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--card-bg); transition: all 0.2s;">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                </div>
                <h2 style="color: var(--text-primary); font-size: 1.5rem;">Account Settings</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Update your profile and account details.</p>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-user-tag"></i>
                        <input type="text" id="username" class="form-control" placeholder="Choose a display name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="text" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Leave blank to keep current password">
                    </div>
                </div>

                <div id="errorMessage" style="color: var(--danger-color); font-size: 0.875rem; text-align: center; margin-bottom: 1rem; display: none;"></div>
                <div id="successMessage" style="color: var(--success-color); font-size: 0.875rem; text-align: center; margin-bottom: 1rem; display: none;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 1rem;">
                    <i class="fa-solid fa-save"></i> Save Changes
                </button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
