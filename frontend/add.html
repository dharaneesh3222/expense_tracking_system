<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Add Transaction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mobile-topbar">
        <a href="dashboard.html" class="brand" style="padding: 0;">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <button class="theme-toggle" id="themeToggleMobile" style="width: auto; padding: 0.5rem; border:none; background:transparent;"><i class="fa-solid fa-moon"></i></button>
    </div>
    <div class="mobile-nav">
        <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="add.html" class="active"><i class="fa-solid fa-plus"></i> Add Transaction</a>
        <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
        <a href="goals.html"><i class="fa-solid fa-bullhorn"></i> Goals</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

    <aside class="sidebar">
        <a href="dashboard.html" class="brand">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <span>FinTrack</span>
        </a>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="add.html" class="active"><i class="fa-solid fa-plus"></i> Add Transaction</a>
            <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
            <a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budgets</a>
            <a href="goals.html"><i class="fa-solid fa-bullhorn"></i> Goals</a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="profile.html"><i class="fa-solid fa-user"></i> My Profile</a>
        </div>
        <div class="sidebar-bottom">
            <div id="userProfile" style="margin-bottom: 1rem; color: var(--text-primary); font-weight: 700; display: flex; align-items: center; gap: 0.5rem; justify-content: center;">
                <i class="fa-solid fa-user-circle" style="font-size: 1.5rem; color: var(--primary-color);"></i> <span id="userNameDisplay">User</span>
            </div>
            <button class="theme-toggle" id="themeToggle" style="margin-bottom: 0.5rem;">
                <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
            </button>
            <button onclick="window.api.logoutUser()" class="theme-toggle" style="color: var(--danger-color); border-color: transparent;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> <span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title" id="formTitle">Add Transaction</h1>
        </header>

        <div class="add-transaction-layout">
            <!-- Left Side: Receipt Preview -->
            <div class="card" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 400px; padding: 2rem;">
                <div class="receipt-preview">
                    <div id="previewIcon" style="width: 64px; height: 64px; display:flex; justify-content: center; align-items: center; font-size: 2rem; margin: 0 auto 1.5rem auto; background: rgba(37,99,235,0.1); color: var(--primary-color); border-radius: 50%;">
                        <i class="fa-solid fa-receipt"></i>
                    </div>
                    <h2 id="previewAmount" style="color: var(--danger-color);">-₹0.00</h2>
                    <p id="previewCategory" style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Select Category</p>
                    <p id="previewDate" style="margin-top: 0.5rem;">Today</p>
                </div>
            </div>

            <!-- Right Side: Interactive Form -->
            <div class="card form-container">
                <form id="transactionForm" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <input type="hidden" id="transactionId">
                    
                    <div class="form-group">
                        <label>Transaction Type</label>
                        <select id="type" class="form-control" required style="font-weight: 700;">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" class="form-control" step="0.01" min="0.01" placeholder="e.g. 500.00" required style="font-size: 1.5rem; font-weight: 700;">
                    </div>

                    <div class="form-group">
                        <label>Category Selection</label>
                        <select id="category" class="form-control" required>
                            <option value="" disabled selected>Select Category...</option>
                            <optgroup label="Expense Categories">
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Online Shopping">Online Shopping</option>
                                <option value="UPI Payment">UPI Payment</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Other Expense">Other Expense</option>
                            </optgroup>
                            <optgroup label="Income Categories">
                                <option value="Salary">Salary</option>
                                <option value="Freelance">Freelance</option>
                                <option value="Investments">Investments</option>
                                <option value="Other Income">Other Income</option>
                            </optgroup>
                        </select>
                    </div>

                        <div class="form-group" style="flex: 1;">
                            <label>Date</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                    
                    <div style="display: flex; gap: 1.5rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Payment Method</label>
                            <select id="paymentMethod" class="form-control">
                                <option value="cash">Cash</option>
                                <option value="upi">UPI / Mobile</option>
                                <option value="card">Credit/Debit Card</option>
                                <option value="bank">Bank Transfer</option>
                            </select>
                        </div>

                        <div class="form-group" style="flex: 2;">
                            <label>Note / Description (Optional)</label>
                            <input type="text" id="note" class="form-control" placeholder="Brief description...">
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 2; padding: 1.25rem; font-size: 1.1rem;"><i class="fa-solid fa-save"></i> Save Transaction</button>
                        <a href="dashboard.html" class="btn btn-outline" style="flex: 1; text-align:center; padding: 1.25rem;"><i class="fa-solid fa-times"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js?v=2"></script>
    <script src="js/theme.js?v=2"></script>
    <script src="js/add.js?v=2"></script>
</body>
</html>
